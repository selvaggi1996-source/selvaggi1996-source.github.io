<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatti - Vincenzo Selvaggi</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" href="assets/favicon.png">

    <meta property="og:type" content="website"/>
    <meta property="og:title" content="Contattami - Vincenzo Selvaggi"/>
    <meta property="og:url" content="https://selvaggi1996-source.github.io/contatti.html"/>
    <meta property="og:description" content="Scrivimi per collaborazioni o progetti!"/>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body id="home">

    <!-- Navbar Bootstrap Mobile-Friendly -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a href="index.html" class="navbar-brand logo">Vincenzo <span class="gradient-text">Selvaggi</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html#about">Su di me</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#experience">Esperienze</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#certificati">Certificati</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">CV</a></li>
                    <li class="nav-item"><a class="nav-link" href="contatti.html">Contatti</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="sezioni" style="margin-top: 150px; padding: 2rem 5%; text-align: center; min-height: 60vh;">
        <div class="form" id="formid" style="background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); padding: 3rem; border-radius: 20px; max-width: 600px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <div class="section-title">
                <h2 style="font-size: 2.5rem; margin-bottom: 2rem; color: var(--primary); font-family: 'Space Grotesk', sans-serif;">Contattami compilando il form</h2>
            </div>

            <form id="contactform" style="display: flex; flex-direction: column; gap: 1.5rem; text-align: left;">
                <input type="hidden" name="contact_number">

                <label class="formelement" for="namespace" style="color: var(--text-light); font-weight: 600;">Nome</label>
                <input required class="formelement" id="namespace" type="text" name="user_name" style="padding: 1rem; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: white; font-family: 'Outfit', sans-serif;">

                <label class="formelement" for="emailspace" style="color: var(--text-light); font-weight: 600;">Email</label>
                <input required class="formelement" id="emailspace" type="email" name="user_email" style="padding: 1rem; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: white; font-family: 'Outfit', sans-serif;">

                <label class="formelement" for="messagespace" style="color: var(--text-light); font-weight: 600;">Messaggio</label>
                <textarea required class="formelement" id="messagespace" name="message" rows="5" style="padding: 1rem; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: white; resize: vertical; font-family: 'Outfit', sans-serif;"></textarea>

                <input class="formelement btn-custom" id="sendbutton" type="submit" value="Invia" style="cursor: pointer; margin-top: 1rem; width: 100%;">
            </form>

            <div id="grazie" style="display: none; color: var(--primary); margin-top: 1.5rem; font-weight: 700; font-size: 1.2rem;">
                Grazie! Il tuo messaggio è stato inviato.
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="d-flex justify-content-center gap-3 mb-4">
            <div class="social-btn"><a href="https://www.linkedin.com/in/vincenzo-selvaggi" target="_blank" class="btn-custom">LinkedIn</a></div>
            <div class="social-btn"><a href="https://github.com/selvaggi1996-source" target="_blank" class="btn-custom">GitHub</a></div>
        </div>
        <div class="footer-text"><p>© 2026 Vincenzo Selvaggi. Tutti i diritti riservati.</p></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript">
        (function(){ emailjs.init("lds3UEMpac6RJq3ZR"); })();
        const contactForm = document.getElementById('contactform');
        contactForm.addEventListener('submit', function(event) {
            event.preventDefault();
            emailjs.sendForm('service_stpg5qj', 'template_jy94jro', this)
                .then(function() {
                    contactForm.style.display = 'none';
                    document.getElementById('grazie').style.display = 'block';
                }, function(error) { alert('Oops, qualcosa è andato storto... riprova!'); });
        });
    </script>
</body>
</html>
