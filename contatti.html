<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contattami | Il Mio Portfolio</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Il tuo Sass compilato -->
    <link rel="stylesheet" href="assets/scss/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navbar Sticky -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Il Mio Portfolio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cv.html">CV</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="contatti.html">Contattami</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenuto Principale Form -->
    <main class="container mt-5 mb-5 flex-grow-1">
        <div class="row">
            <div class="col-lg-6 mx-auto">
                <h1 class="fw-bold mb-4 text-center">Lavoriamo Insieme</h1>
                <p class="text-center text-muted mb-5">Hai un progetto in mente o vuoi semplicemente salutarmi? Compila il form qui sotto e ti risponderò il prima possibile!</p>
                
                <!-- Il Form -->
                <div class="card shadow-sm border-0 bg-light p-4">
                    <form action="#" method="POST">
                        <div class="mb-3">
                            <label for="nome" class="form-label fw-bold">Il tuo nome</label>
                            <!-- L'attributo "required" rende il campo obbligatorio, come chiesto dal prof -->
                            <input type="text" class="form-control" id="nome" placeholder="Mario Rossi" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">La tua email</label>
                            <input type="email" class="form-control" id="email" placeholder="mario@email.com" required>
                        </div>
                        <div class="mb-4">
                            <label for="messaggio" class="form-label fw-bold">Il tuo messaggio</label>
                            <textarea class="form-control" id="messaggio" rows="5" placeholder="Scrivi qui il tuo messaggio..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Invia Messaggio</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <div class="row">
                <div class="col-12 mb-3">
                    <a href="https://github.com/selvaggi1996-source" target="_blank" class="text-white text-decoration-none me-3">GitHub</a>
                </div>
                <div class="col-12">
                    <p class="mb-0 small">&copy; 2026 Il Mio Portfolio UX/UI. Tutti i diritti riservati.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
