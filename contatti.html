<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vincenzo Selvaggi - Contatti</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">

    <style>
        :root {
            --bg-main: #0B0E14;
            --primary: #00F0FF;
            --secondary: #FF003C;
            --text-light: #E2E8F0;
            --text-muted: #94A3B8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
        }

        .gradient-text {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Space Grotesk', sans-serif;
        }

        .navbar-custom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(11, 14, 20, 0.8);
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-light);
            transition: opacity 0.3s ease;
        }
        
        .logo:hover {
            opacity: 0.8;
            color: var(--text-light);
        }

        .nav-links-custom {
            list-style: none;
            display: flex;
            gap: 2.5rem;
            margin: 0;
            padding: 0;
        }

        .nav-links-custom a {
            color: var(--text-light);
            font-weight: 400;
            transition: color 0.3s ease;
        }

        .nav-links-custom a:hover {
            color: var(--primary);
        }

        .section {
            padding: 120px 5% 4rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .section-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: 700;
        }

        /* STILI DEL FORM */
        .contact-form {
            width: 100%;
            max-width: 600px;
            margin: 2rem auto 0;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .btn-custom {
            padding: 1rem 2.5rem;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
            cursor: pointer;
            width: 100%;
        }

        .btn-custom:hover {
            background: var(--primary);
            color: var(--bg-main);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
        }

        .footer {
            text-align: center;
            padding: 3rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: var(--text-muted);
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .nav-links-custom { display: none; } 
        }
    </style>
</head>
<body>

    <nav class="navbar-custom">
        <a href="index.html" class="logo">Vincenzo <span class="gradient-text">Selvaggi</span></a>
        <ul class="nav-links-custom">
            <!-- Dalla pagina contatti, i link tornano alla index nelle sezioni giuste -->
            <li><a href="index.html#about">Su di me</a></li>
            <li><a href="index.html#experience">Esperienze e Formazione</a></li>
            <li><a href="#">Contatti</a></li>
        </ul>
    </nav>

    <main class="section">
        <h1 class="section-title">Mettiamoci in <span class="gradient-text">Contatto</span></h1>
        <p style="color: var(--text-muted); text-align: center; max-width: 600px;">
            Compila il form per inviarmi un messaggio sicuro. Sono sempre alla ricerca di nuove opportunità e collaborazioni.
        </p>
        
        <form class="contact-form" action="#" method="POST">
            <div class="form-group">
                <input type="text" placeholder="Il tuo nome" required>
            </div>
            <div class="form-group">
                <input type="email" placeholder="La tua email" required>
            </div>
            <div class="form-group">
                <textarea placeholder="Il tuo messaggio" required></textarea>
            </div>
            <button type="submit" class="btn-custom">Invia Messaggio</button>
        </form>
    </main>

    <footer class="footer">
        <p>© 2026 Vincenzo Selvaggi. Tutti i diritti riservati.</p>
    </footer>

</body>
</html>
