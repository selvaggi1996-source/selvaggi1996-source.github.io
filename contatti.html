<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vincenzo Selvaggi - Contatti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
    <style>
        :root {
            --bg-main: #0B0E14;
            --primary: #00F0FF;
            --secondary: #FF003C;
            --text-light: #E2E8F0;
            --text-muted: #94A3B8;
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-main); color: var(--text-light); padding-top: 120px; }
        .gradient-text { background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Space Grotesk', sans-serif; }
        nav { border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(12px); position: fixed !important; top: 0; width: 100%; z-index: 1000; background: rgba(11, 14, 20, 0.8) !important; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; text-decoration: none; color: var(--text-light); }
        .nav-link { color: var(--text-light) !important; }
        .nav-link:hover { color: var(--primary) !important; }
        
        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }
        .contact-form input:focus, .contact-form textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            background: var(--primary);
            color: var(--bg-main);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a href="index.html" class="logo">Vincenzo <span class="gradient-text">Selvaggi</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon" style="filter: invert(1);"></span></button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Su di me</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Esperienze e Formazione</a></li>
                    <li class="nav-item"><a class="nav-link" href="contatti.html">Contatti</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h1 class="text-center mb-4 fw-bold fs-1">Mettiamoci in <span class="gradient-text">Contatto</span></h1>
        <p class="text-center text-muted mb-5">Compila il form per inviarmi un messaggio sicuro al riparo dai bot di spam.</p>
        
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <form class="contact-form" action="#" method="POST">
                    <input type="text" placeholder="Il tuo nome" required>
                    <input type="email" placeholder="La tua email" required>
                    <textarea placeholder="Il tuo messaggio" rows="5" required></textarea>
                    <button type="submit" class="btn-submit">Invia Messaggio</button>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
