<body id="home">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a href="index.html" class="navbar-brand logo">Vincenzo <span class="gradient-text">Selvaggi</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

            </div>
        </div>

    <main class="main-spacing">
        <div class="form-container" id="formid">
            <div class="section-title">
                <h1 class="form-title">Contattami compilando il form</h1>
            </div>

            <form id="contactform" class="custom-form">
                <input type="hidden" name="contact_number">

                <label class="custom-label" for="namespace">Nome</label>
                <input required class="custom-input" id="namespace" type="text" name="user_name">

                <label class="custom-label" for="emailspace">Email</label>
                <input required class="custom-input" id="emailspace" type="email" name="user_email">

                <label class="custom-label" for="messagespace">Messaggio</label>
                <textarea required class="custom-input custom-textarea" id="messagespace" name="message" rows="5"></textarea>

                <input class="btn-custom submit-btn" id="sendbutton" type="submit" value="Invia">
            </form>

            <div id="grazie" class="success-msg">
                Grazie! Il tuo messaggio è stato inviato.
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="d-flex justify-content-center gap-3 mb-4">
            <div class="social-btn"><a href="https://www.linkedin.com/in/vincenzo-selvaggi" target="_blank" class="btn-custom">LinkedIn</a></div>
            <div class="social-btn"><a href="https://github.com/selvaggi1996-source" target="_blank" class="btn-custom">GitHub</a></div>
        </div>
        <div class="footer-text"><p>© 2026 Vincenzo Selvaggi. Tutti i diritti riservati.</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript">
        (function(){ emailjs.init("lds3UEMpac6RJq3ZR"); })();
        const contactForm = document.getElementById('contactform');
        contactForm.addEventListener('submit', function(event) {
            event.preventDefault();
            emailjs.sendForm('service_stpg5qj', 'template_jy94jro', this)
                .then(function() {
                    contactForm.style.display = 'none';
                    document.getElementById('grazie').style.display = 'block';
                }, function(error) { alert('Oops, qualcosa è andato storto... riprova!'); });
        });
    </script>
</body>
